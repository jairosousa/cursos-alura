spring:
  application:
    name: ecomart

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      model: gpt-3.5-turbo
      max-tokens: 1000
      temperature: 0.7
      system-prompt: "You will be a helpful assistant on an e-commerce platform for eco-friendly products. Your duties include providing concise and accurate answers to user questions about products, orders, and general information related to the platform."
